nt(135deg,var(--accent),var(--accent2));box-shadow:0 10px 26px #3b46d24b}.btn.danger{color:#fecaca;background:#ef444420;border-color:#ef444450}.btn.small{min-height:36px;padding:8px 11px;font-size:13px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0}.stat{padding:15px;border:1px solid var(--line);border-radius:16px;background:#111827d7}.stat span{color:var(--muted);font-size:12px}.stat strong{display:block;font-size:24px;margin-top:5px}.toolbar{display:grid;grid-template-columns:1fr auto auto;gap:9px;margin:15px 0}.field,.select,.textarea{width:100%;color:var(--text);background:#111827e8;border:1px solid var(--line);border-radius:13px;outline:none}.field,.select{height:46px;padding:0 12px}.textarea{min-height:105px;padding:12px;resize:vertical;line-height:1.5}.field:focus,.select:focus,.textarea:focus{border-color:#6d7dff;box-shadow:0 0 0 3px #6366f125}.headrow{display:flex;justify-content:space-between;align-items:end;gap:12px;margin:22px 0 12px}.headrow h3{margin:0;font-size:22px}.headrow p{margin:3px 0 0;color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}.card{overflow:hidden;border:1px solid var(--line);border-radius:18px;background:#111827dc;box-shadow:0 16px 42px #0004}.poster{aspect-ratio:2/3;background:linear-gradient(145deg,#202c45,#101827);display:grid;place-items:center;overflow:hidden;position:relative}.poster img{width:100%;height:100%;object-fit:cover}.poster .placeholder{font-size:50px;color:#8292ab}.chips{position:absolute;left:8px;right:8px;top:8px;display:flex;justify-content:space-between;gap:6px;pointer-events:none}.chip{font-size:10px;font-weight:700;border-radius:999px;padding:5px 8px;background:#070b14cc;border:1px solid #ffffff25;backdrop-filter:blur(8px)}.body{padding:12px}.title{font-weight:760;line-height:1.25;min-height:2.5em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta{margin-top:7px;color:var(--muted);font-size:12px}.card-actions{display:grid;grid-template-columns:1fr auto;gap:7px;margin-top:11px}.empty{text-align:center;padding:50px 18px;border:1px dashed #ffffff2b;border-radius:20px;background:#11182772}.empty b{display:block;font-size:20px;margin:9px 0 6px}.empty p{color:var(--muted);margin:0 0 15px}.panel{border:1px solid var(--line);border-radius:22px;background:#111827d0;padding:18px;box-shadow:0 20px 55px #0005}.panel h2{margin:0 0 5px}.lead{color:var(--muted);margin:0 0 17px;line-height:1.5}.formgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.group{display:grid;gap:6px}.group.full{grid-column:1/-1}.group label{color:#c5d0e2;font-size:13px}.checks{display:flex;flex-wrap:wrap;gap:14px;align-items:center;min-height:44px}.checks label{display:flex;gap:7px;align-items:center}.checks input{width:20px;height:20px;accent-color:var(--accent)}.coverbox{display:grid;grid-template-columns:150px 1fr;gap:15px}.preview{aspect-ratio:2/3;border:1px solid var(--line);border-radius:15px;overflow:hidden;background:var(--panel2);display:grid;place-items:center;color:var(--muted)}.preview img{width:100%;height:100%;object-fit:cover}.savebar{position:sticky;bottom:calc(78px + env(safe-area-inset-bottom));z-index:10;display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding:10px;border:1px solid var(--line);border-radius:16px;background:#0b1120e8;backdrop-filter:blur(14px)}.nav{position:fixed;z-index:30;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:4px;padding:6px;border:1px solid var(--line);border-radius:18px;background:#090e19eb;backdrop-filter:blur(20px);box-shadow:0 20px 60px #0008}.nav button{min-width:78px;border:0;border-radius:12px;padding:8px 10px;background:transparent;color:var(--muted);display:grid;gap:2px}.nav button.active{color:white;background:var(--panel2)}.nav span:first-child{font-size:18px}.nav span:last-child{font-size:11px}.toast{position:fixed;z-index:60;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translate(-50%,20px);opacity:0;pointer-events:none;transition:.2s;max-width:calc(100vw - 32px);padding:11px 14px;border-radius:13px;background:#111827;border:1px solid var(--line);box-shadow:0 18px 50px #0009}.toast.show{opacity:1;transform:translate(-50%,0)}.modal{position:fixed;inset:0;z-index:50;background:#000a;display:grid;place-items:end center;padding:18px 12px calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(6px)}.sheet{width:min(620px,100%);max-height:88dvh;overflow:auto;border:1px solid var(--line);border-radius:24px;background:#0e1626;padding:18px;box-shadow:0 30px 90px #000}.sheet h2{margin:0 0 5px}.scanner{width:100%;aspect-ratio:4/3;background:#02050a;border-radius:16px;overflow:hidden;margin:12px 0;position:relative}.scanner video{width:100%;height:100%;object-fit:cover}.scanline{position:absolute;left:10%;right:10%;top:49%;height:2px;background:#ef4444;box-shadow:0 0 14px #ef4444}.detail{display:grid;grid-template-columns:minmax(180px,280px) 1fr;gap:20px}.detail img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:18px;background:var(--panel2)}.detail h2{font-size:clamp(28px,7vw,44px);letter-spacing:-.04em;margin:0}.detail p{color:#d6e0ef;white-space:pre-wrap;line-height:1.6}.muted{color:var(--muted)}.settings-list{display:grid;gap:14px}.status{font-size:12px;color:var(--muted);margin-top:5px}.status.ok{color:#86efac}.status.warn{color:#fcd34d}@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr 1fr}.toolbar .search{grid-column:1/-1}.formgrid{grid-template-columns:1fr}.group.full{grid-column:auto}.coverbox{grid-template-columns:115px 1fr}.detail{grid-template-columns:1fr}.detail img{width:min(230px,70vw);margin:auto}.top .btn span{display:none}}@media(max-width:430px){.wrap{padding-left:12px;padding-right:12px}.hero{padding:19px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card .body{padding:10px}.nav button{min-width:69px}.toolbar{grid-template-columns:1fr}.toolbar .search{grid-column:auto}.coverbox{grid-template-columns:1fr}.preview{width:150px}.savebar{bottom:calc(75px + env(safe-area-inset-bottom))}}

<body>
<header class="top"><div class="brand"><div class="logo">▶</div><div><h1>Min filmsamling</h1><small id="saveStatus">Gemmes automatisk på denne iPhone</small></div></div><button class="btn small" id="quickAdd">＋ <span>Tilføj</span></button></header>
<div id="app"></div>
<nav class="nav" aria-label="Hovedmenu"><button data-view="library" class="active"><span>🎬</span><span>Film</span></button><button data-view="form"><span>＋</span><span>Tilføj</span></button><button data-view="settings"><span>⚙️</span><span>Indstillinger</span></button></nav>
<div class="toast" id="toast"></div><div id="modal"></div>
<script>
(()=>{'use strict';
const KEY='filmsamling_v4',DRAFT='filmsamling_draft_v4',SET='filmsamling_settings_v4';
const app=document.querySelector('#app'),modal=document.querySelector('#modal'),toast=document.querySelector('#toast'),saveStatus=document.querySelector('#saveStatus');
let films=read(KEY,[]),settings=read(SET,{tmdbToken:'',language:'da-DK'}),state={view:'library',edit:null,detail:null,search:'',format:'all'},draft=read(DRAFT,null),saveTimer=null,scanner=null,ocrCandidates=[];
function read(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}}
function write(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}}
function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function uid(){return crypto.randomUUID?crypto.randomUUID():'f-'+Date.now()+'-'+Math.random().toString(16).slice(2)}
function msg(text){toast.textContent=text;toast.classList.add('show');clearTimeout(msg.t);msg.t=setTimeout(()=>toast.classList.remove('show'),2300)}
function persist(){write(KEY,films);saveStatus.textContent='Gemt automatisk';saveStatus.className='status ok';clearTimeout(saveTimer);saveTimer=setTimeout(()=>{saveStatus.textContent='Gemmes automatisk på denne iPhone';saveStatus.className=''},1800)}
function setView(v){state.view=v;state.detail=null;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));render();scrollTo(0,0)}
function stats(){return{total:films.length,watched:films.filter(f=>f.watched).length,fav:films.filter(f=>f.favorite).length,formats:new Set(films.map(f=>f.format).filter(Boolean)).size}}
function filtered(){let a=[...films];const q=state.search.trim().toLowerCase();if(q)a=a.filter(f=>[f.title,f.plot,f.genre,f.director,f.barcode].join(' ').toLowerCase().includes(q));if(state.format!=='all')a=a.filter(f=>f.format===state.format);return a.sort((a,b)=>(a.title||'').localeCompare(b.title||'','da'))}
function render(){if(state.detail)return renderDetail();if(state.view==='form')return renderForm();if(state.view==='settings')return renderSettings();renderLibrary()}
function renderLibrary(){const s=stats(),items=filtered(),formats=[...new Set(films.map(f=>f.format).filter(Boolean))].sort();app.innerHTML=`<main class="wrap"><section class="hero"><h2>Din filmsamling.<br>Altid i lommen.</h2><p>Scan stregkoden, hent oplysninger fra nettet, eller registrér filmen manuelt. Alt gemmes automatisk lokalt.</p><div class="actions"><button class="btn primary" data-action="scan">▣ Scan stregkode</button><label class="btn">📷 Scan tekst på cover<input hidden type="file" id="libraryCoverTextCamera" accept="image/*" capture="environment"></label><button class="btn" data-action="new">＋ Tilføj manuelt</button></div></section><section class="stats"><div class="stat"><span>Film i alt</span><strong>${s.total}</strong></div><div class="stat"><span>Set</span><strong>${s.watched}</strong></div><div class="stat"><span>Favoritter</span><strong>${s.fav}</strong></div><div class="stat"><span>Formater</span><strong>${s.formats}</strong></div></section><section class="toolbar"><input class="field search" id="search" placeholder="Søg i titel, handling, genre…" value="${esc(state.search)}"><select class="select" id="formatFilter"><option value="all">Alle formater</option>${formats.map(x=>`<option ${state.format===x?'selected':''}>${esc(x)}</option>`).join('')}</select><button class="btn" data-action="scan">▣ Scan</button></section><div class="headrow"><div><h3>Samlingen</h3><p>${items.length} ${items.length===1?'film':'film'} vist</p></div></div>${items.length?`<section class="grid">${items.map(card).join('')}</section>`:`<section class="empty"><div style="font-size:52px">🎞️</div><b>Samlingen er tom</b><p>Tilføj din første film ved at scanne stregkoden eller skrive oplysningerne selv.</p><button class="btn primary" data-action="new">Tilføj første film</button></section>`}</main>`}
function card(f){return`<article class="card"><div class="poster">${f.cover?`<img src="${f.cover}" alt="Cover til ${esc(f.title)}">`:`<div class="placeholder">🎬</div>`}<div class="chips"><span class="chip">${esc(f.format||'Film')}</span>${f.favorite?'<span class="chip">★</span>':''}</div></div><div class="body"><div class="title">${esc(f.title||'Uden titel')}</div><div class="meta">${[f.year,f.genre].filter(Boolean).map(esc).join(' · ')||'Ingen ekstra oplysninger'}</div><div class="card-actions"><button class="btn small" data-action="detail" data-id="${f.id}">Åbn</button><button class="btn small" data-action="edit" data-id="${f.id}">✎</button></div></div></article>`}
function blank(){return{id:'',title:'',originalTitle:'',year:'',format:'DVD',genre:'',plot:'',director:'',actors:'',runtime:'',barcode:'',location:'',notes:'',cover:'',watched:false,favorite:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function current(){if(state.edit)return films.find(f=>f.id===state.edit)||blank();return draft?{...blank(),...draft}:blank()}
function renderForm(){const f=current();app.innerHTML=`<main class="wrap"><section class="panel"><h2>${state.edit?'Rediger film':'Tilføj film'}</h2><p class="lead">Felterne gemmes automatisk som kladde. Tryk Gem film, når titlen er klar.</p><form id="filmForm"><div class="formgrid"><div class="group full"><label>Titel *</label><div class="actions"><input class="field" name="title" value="${esc(f.title)}" placeholder="Filmens titel" style="flex:1"><label class="btn">📷 Scan covertekst<input hidden type="file" id="coverTextCamera" accept="image/*" capture="environment"></label><button class="btn" type="button" data-action="lookup-title">Find oplysninger/omslag</button></div><p class="muted">Tag et tydeligt billede af forsiden. Appen læser teksten og viser forslag til titlen, så du ikke skal skrive den.</p></div><div class="group"><label>Originaltitel</label><input class="field" name="originalTitle" value="${esc(f.originalTitle)}"></div><div class="group"><label>År</label><input class="field" name="year" inputmode="numeric" value="${esc(f.year)}"></div><div class="group"><label>Format</label><select class="select" name="format">${['DVD','Blu-ray','4K UHD','VHS','Digital','Andet'].map(x=>`<option ${f.format===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="group"><label>Genre</label><input class="field" name="genre" value="${esc(f.genre)}"></div><div class="group"><label>Instruktør</label><input class="field" name="director" value="${esc(f.director)}"></div><div class="group"><label>Skuespillere</label><input class="field" name="actors" value="${esc(f.actors)}"></div><div class="group"><label>Spilletid</label><input class="field" name="runtime" value="${esc(f.runtime)}" placeholder="fx 121 min"></div><div class="group"><label>Stregkode</label><div class="actions"><input class="field" name="barcode" inputmode="numeric" value="${esc(f.barcode)}" style="flex:1"><button class="btn" type="button" data-action="scan">▣</button></div></div><div class="group"><label>Placering</label><input class="field" name="location" value="${esc(f.location)}" placeholder="fx Reol 2"></div><div class="group full"><label>Handling</label><textarea class="textarea" name="plot">${esc(f.plot)}</textarea></div><div class="group full"><label>Noter</label><textarea class="textarea" name="notes">${esc(f.notes)}</textarea></div><div class="group full"><label>Cover</label><div class="coverbox"><div class="preview" id="coverPreview">${f.cover?`<img src="${f.cover}" alt="Cover">`:'Intet cover'}</div><div><div class="actions"><label class="btn">Vælg billede<input hidden type="file" id="coverFile" accept="image/*"></label><label class="btn">Tag foto<input hidden type="file" id="coverCamera" accept="image/*" capture="environment"></label>${f.cover?'<button class="btn danger" type="button" data-action="remove-cover">Fjern</button>':''}</div><p class="muted">Billedet komprimeres og gemmes lokalt på denne enhed.</p></div></div></div><div class="group full"><div class="checks"><label><input type="checkbox" name="watched" ${f.watched?'checked':''}> Set</label><label><input type="checkbox" name="favorite" ${f.favorite?'checked':''}> Favorit</label></div></div></div><div class="savebar"><button type="button" class="btn" data-action="cancel">Annuller</button><button class="btn primary" type="submit">Gem film</button></div></form></section></main>`}
function formData(){const form=document.querySelector('#filmForm');if(!form)return null;const data=new FormData(form),base=current();for(const [k,v] of data.entries())base[k]=String(v);base.watched=form.watched.checked;base.favorite=form.favorite.checked;base.updatedAt=new Date().toISOString();return base}
function draftNow(){const d=formData();if(!d)return;draft=d;write(DRAFT,draft);saveStatus.textContent='Kladde gemt automatisk';saveStatus.className='status ok'}
function saveFilm(){const d=formData();if(!d||!d.title.trim())return msg('Skriv en titel først.');d.title=d.title.trim();if(state.edit){films=films.map(f=>f.id===state.edit?{...d,id:state.edit}:f)}else{d.id=uid();films.unshift(d)}persist();draft=null;localStorage.removeItem(DRAFT);state.edit=null;setView('library');msg('Filmen er gemt.')}
function renderDetail(){const f=films.find(x=>x.id===state.detail);if(!f){state.detail=null;return renderLibrary()}app.innerHTML=`<main class="wrap"><section class="panel"><div class="actions" style="margin-bottom:16px"><button class="btn" data-action="back">← Tilbage</button><button class="btn" data-action="edit" data-id="${f.id}">Rediger</button><button class="btn danger" data-action="delete" data-id="${f.id}">Slet</button></div><div class="detail">${f.cover?`<img src="${f.cover}" alt="Cover til ${esc(f.title)}">`:`<div class="preview" style="min-height:300px">Intet cover</div>`}<div><h2>${esc(f.title)}</h2><div class="muted">${[f.originalTitle,f.year,f.format,f.runtime].filter(Boolean).map(esc).join(' · ')}</div><div class="actions" style="margin:15px 0">${f.genre?`<span class="chip">${esc(f.genre)}</span>`:''}${f.watched?'<span class="chip">✓ Set</span>':''}${f.favorite?'<span class="chip">★ Favorit</span>':''}</div><p>${esc(f.plot||'Ingen handling er registreret.')}</p>${f.director?`<p><b>Instruktør:</b> ${esc(f.director)}</p>`:''}${f.actors?`<p><b>Skuespillere:</b> ${esc(f.actors)}</p>`:''}${f.location?`<p><b>Placering:</b> ${esc(f.location)}</p>`:''}${f.barcode?`<p><b>Stregkode:</b> ${esc(f.barcode)}</p>`:''}${f.notes?`<p><b>Noter:</b> ${esc(f.notes)}</p>`:''}</div></div></section></main>`}
function renderSettings(){app.innerHTML=`<main class="wrap"><section class="panel"><h2>Indstillinger og backup</h2><p class="lead">Samlingen gemmes lokalt på denne enhed. Eksportér jævnligt en backup.</p><div class="settings-list"><div class="group"><label>TMDB Read Access Token (valgfrit)</label><textarea class="textarea" id="tmdbToken" placeholder="Indsæt token for flest filmoplysninger">${esc(settings.tmdbToken)}</textarea><div class="muted">TMDB-token er valgfrit. Når du scanner en stregkode, forsøger appen først at finde titlen direkte via Apple og derefter via stregkodedatabasen. Derefter hentes filmoplysninger og omslag automatisk.</div></div><div class="actions"><button class="btn primary" data-action="save-settings">Gem indstillinger</button><button class="btn" data-action="export">Eksportér backup</button><label class="btn">Importér backup<input hidden id="importFile" type="file" accept="application/json"></label></div><div><b>Lokal lagring</b><p class="muted">${films.length} film er gemt på denne enhed. Slet ikke Safari-webstedsdata uden først at eksportere en backup.</p></div><button class="btn danger" data-action="clear">Slet hele samlingen</button></div></section></main>`}
async function fileToCover(file){if(!file)return;const img=new Image(),url=URL.createObjectURL(file);await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url});const max=900,scale=Math.min(1,max/img.width,max*1.5/img.height),c=document.createElement('canvas');c.width=Math.max(1,Math.round(img.width*scale));c.height=Math.max(1,Math.round(img.height*scale));c.getContext('2d').drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);const d=formData()||current();d.cover=c.toDataURL('image/jpeg',.82);draft=d;write(DRAFT,d);renderForm();msg('Coveret er gemt i kladden.')}
function cleanMovieTitle(v=''){return String(v).replace(/\b(4k\s*uhd|ultra\s*hd|blu[- ]?ray|dvd|vhs|steelbook|special edition|collector'?s edition|limited edition|extended edition|director'?s cut|2[- ]?disc|3[- ]?disc|region\s*[0-9a-z]+|nordic|dansk tekst|danish subtitles?)\b/gi,' ').replace(/[\[\](){}|]+/g,' ').replace(/\s{2,}/g,' ').trim()}
function normMovieTitle(v=''){return cleanMovieTitle(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim()}
function largeAppleArtwork(url=''){return String(url).replace(/^http:/,'https:').replace(/\d+x\d+bb(?=\.(jpg|png))/i,'1200x1200bb')}
function appleJSON(url){return new Promise((resolve,reject)=>{const cb='__filmApple'+Date.now()+Math.random().toString(36).slice(2),script=document.createElement('script');let done=false;const finish=(ok,value)=>{if(done)return;done=true;clearTimeout(timer);delete window[cb];script.remove();ok?resolve(value):reject(value)};window[cb]=data=>finish(true,data);script.onerror=()=>finish(false,Error('Apple-opslag fejlede'));script.src=url+(url.includes('?')?'&':'?')+'callback='+encodeURIComponent(cb);document.head.appendChild(script);const timer=setTimeout(()=>finish(false,Error('Apple-opslag tog for lang tid')),12000)})}
function applyAppleMovie(d,hit,{replaceTitle=false}={}){if(!hit)return false;Object.assign(d,{title:replaceTitle||!d.title?hit.trackName||hit.collectionName||d.title:d.title,originalTitle:d.originalTitle||hit.trackName||hit.collectionName||'',year:d.year||(hit.releaseDate||'').slice(0,4),genre:d.genre||hit.primaryGenreName||'',plot:d.plot||hit.longDescription||hit.shortDescription||'',runtime:d.runtime||(hit.trackTimeMillis?Math.round(hit.trackTimeMillis/60000)+' min':''),cover:largeAppleArtwork(hit.artworkUrl100||hit.artworkUrl60)||d.cover});return Boolean(d.title)}
function barcodeVariants(code){const c=String(code||'').replace(/\D/g,''),out=[c];if(c.length===13&&c.startsWith('0'))out.push(c.slice(1));if(c.length===12)out.push('0'+c);return [...new Set(out.filter(Boolean))]}
function productMovieTitle(item={}){let t=String(item.title||item.description||'').trim();if(!t)return'';t=t.replace(/\b(dvd|blu[- ]?ray|4k\s*uhd|ultra\s*hd|vhs)\b.*$/i,'').replace(/^\s*(new|used)\s*[:-]\s*/i,'').replace(/\s*[-–—|]\s*(dvd|blu[- ]?ray|4k|uhd|region|pal|ntsc).*$/i,'').replace(/\s{2,}/g,' ').trim();return cleanMovieTitle(t)||t}
async function lookupAppleMovie(d){const wanted=cleanMovieTitle(d.title);if(!wanted)return false;const q=encodeURIComponent(wanted),locale=(navigator.language||'da-DK').split('-').pop().toUpperCase(),countries=[...new Set([locale,'DK','US'])],target=normMovieTitle(wanted),wantedYear=String(d.year||'');for(const country of countries){const j=await appleJSON(`https://itunes.apple.com/search?term=${q}&country=${country}&media=movie&entity=movie&limit=25`),hits=(j.results||[]).filter(x=>x.trackName&&(x.kind==='feature-movie'||x.wrapperType==='track'));hits.sort((a,b)=>{const score=x=>{const n=normMovieTitle(x.trackName),y=(x.releaseDate||'').slice(0,4);let s=n===target?100:(n.includes(target)||target.includes(n)?55:0);if(wantedYear&&y===wantedYear)s+=35;if(x.artworkUrl100)s+=10;return s};return score(b)-score(a)});if(hits[0])return applyAppleMovie(d,hits[0])}return false}
async function lookupAppleBarcode(code,d){const locale=(navigator.language||'da-DK').split('-').pop().toUpperCase(),countries=[...new Set([locale,'DK','US','GB'])];for(const upc of barcodeVariants(code)){for(const country of countries){try{const j=await appleJSON(`https://itunes.apple.com/lookup?upc=${encodeURIComponent(upc)}&country=${country}&entity=movie&limit=25`),hit=(j.results||[]).find(x=>x.trackName&&(x.kind==='feature-movie'||x.wrapperType==='track'&&x.trackName));if(hit){applyAppleMovie(d,hit,{replaceTitle:true});return true}}catch(e){console.warn('Apple UPC-opslag:',e)}}}return false}
async function lookupUPCItem(code){const r=await fetch('https://api.upcitemdb.com/prod/trial/lookup?upc='+encodeURIComponent(code),{headers:{accept:'application/json'}});if(r.status===429)throw Error('Stregkodedatabasen har nået sin dagsgrænse');if(!r.ok)throw Error('Stregkodedatabasen svarede '+r.status);const j=await r.json();if(j.code&&j.code!=='OK')throw Error(j.message||j.code);return j.items?.[0]||null}
async function lookupTitle(){const d=formData();if(!d?.title.trim())return msg('Skriv en titel først.');msg('Søger efter film og omslag…');let source='',tmdbError=null;try{if(settings.tmdbToken){const lang=settings.language||'da-DK',h={Authorization:'Bearer '+settings.tmdbToken,accept:'application/json'},q=encodeURIComponent(cleanMovieTitle(d.title.trim())),r=await fetch(`https://api.themoviedb.org/3/search/movie?query=${q}&language=${lang}&include_adult=false`,{headers:h});if(!r.ok)throw Error('TMDB svarede '+r.status);const j=await r.json(),target=normMovieTitle(d.title),wantedYear=String(d.year||''),results=[...(j.results||[])];results.sort((a,b)=>{const score=x=>{const n=normMovieTitle(x.title||x.original_title),y=(x.release_date||'').slice(0,4);let s=n===target?100:(n.includes(target)||target.includes(n)?50:0);if(wantedYear&&y===wantedYear)s+=35;if(x.poster_path)s+=10;return s};return score(b)-score(a)});const hit=results[0];if(hit){const rr=await fetch(`https://api.themoviedb.org/3/movie/${hit.id}?language=${lang}&append_to_response=credits`,{headers:h});if(!rr.ok)throw Error('TMDB-detaljer svarede '+rr.status);const det=await rr.json();Object.assign(d,{title:det.title||d.title,originalTitle:det.original_title||'',year:(det.release_date||'').slice(0,4),genre:(det.genres||[]).map(x=>x.name).join(', '),plot:det.overview||d.plot||'',runtime:det.runtime?det.runtime+' min':d.runtime||'',director:(det.credits?.crew||[]).find(x=>x.job==='Director')?.name||d.director||'',actors:(det.credits?.cast||[]).slice(0,6).map(x=>x.name).join(', ')||d.actors||'',cover:det.poster_path?'https://image.tmdb.org/t/p/w780'+det.poster_path:d.cover});source='TMDB'}}}catch(e){tmdbError=e;console.warn('TMDB-opslag:',e)}
try{if(!d.cover){const found=await lookupAppleMovie(d);if(found)source=source?source+' + Apple':'Apple'}}catch(e){console.warn('Apple-opslag:',e)}
if(!source&&!d.cover){console.error(tmdbError);return msg(settings.tmdbToken?'Ingen film eller omslag blev fundet. Prøv titel og årstal.':'Ingen omslag blev fundet. Prøv titel og årstal eller tilføj et TMDB-token.')}draft=d;write(DRAFT,d);renderForm();msg(source?`Oplysninger/omslag hentet fra ${source}.`:'Omslaget er bevaret.')}
async function lookupBarcode(code){code=String(code||'').replace(/\D/g,'');if(!code)return msg('Stregkoden er tom.');let d=formData()||current();d.barcode=code;draft=d;write(DRAFT,d);closeModal();setView('form');msg('Søger titel automatisk via stregkoden…');let source='';try{if(await lookupAppleBarcode(code,d))source='Apple'}catch(e){console.warn(e)}if(!d.title){try{const item=await lookupUPCItem(code),name=productMovieTitle(item);if(item?.images?.[0]&&!d.cover)d.cover=item.images[0];if(name){d.title=name;source='stregkodedatabasen'}}catch(e){console.warn(e);if(/dagsgrænse/.test(e.message))msg(e.message)}}if(d.title){draft=d;write(DRAFT,d);renderForm();msg(`Titlen blev fundet via ${source||'stregkoden'}. Henter filmoplysninger…`);try{await lookupTitle()}catch(e){console.warn(e)}return}draft=d;write(DRAFT,d);renderForm();msg('Stregkoden blev gemt, men titlen findes ikke i de tilgængelige databaser. Skriv titlen manuelt.')}
function openScanner(){modal.innerHTML=`<div class="modal"><section class="sheet"><h2>Scan stregkode</h2><p class="lead">Hold stregkoden roligt foran kameraet. Appen finder derefter titlen automatisk. Du kan også skrive nummeret manuelt.</p><div class="scanner"><video id="video" playsinline muted></video><div class="scanline"></div></div><div class="group"><label>Stregkode manuelt</label><input class="field" id="manualCode" inputmode="numeric" placeholder="EAN eller UPC"></div><div class="actions" style="margin-top:12px"><button class="btn primary" data-action="use-code">Brug nummer</button><button class="btn" data-action="close-modal">Luk</button></div><p class="muted" id="scanHelp">Starter kamera…</p></section></div>`;startScanner()}
async function loadZXing(){if(window.ZXing)return true;return new Promise(resolve=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';s.onload=()=>resolve(true);s.onerror=()=>resolve(false);document.head.appendChild(s)})}
async function loadTesseract(){if(window.Tesseract)return true;return new Promise(resolve=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';s.onload=()=>resolve(true);s.onerror=()=>resolve(false);document.head.appendChild(s)})}
function ocrTitleCandidates(text=''){const raw=String(text).split(/\r?\n/).map(x=>x.replace(/[|_~]/g,' ').replace(/\s+/g,' ').trim()).filter(Boolean),noise=/\b(dvd|blu[- ]?ray|4k|uhd|ultra hd|digital|dolby|dts|widescreen|subtitles?|undertekster|region|disc|disk|copyright|all rights reserved|rated|certificate|www\.|https?|studio|home entertainment|special features|bonus|edition|collection|movie|film by|directed by|producer|starring|academy award|winner|nominated)\b/i,out=[];function add(title,score){title=title.replace(/^[^A-Za-zÀ-ÖØ-öø-ÿ0-9]+|[^A-Za-zÀ-ÖØ-öø-ÿ0-9!?&:'-]+$/g,'').replace(/\s{2,}/g,' ').trim();if(title.length<2||title.length>72||noise.test(title)||/^\d+[+ -]*$/.test(title)||!/[A-Za-zÀ-ÖØ-öø-ÿ]{2}/.test(title))return;const key=title.toLocaleLowerCase('da');if(!out.some(x=>x.key===key))out.push({title,key,score})}raw.forEach((line,i)=>{const letters=(line.match(/[A-Za-zÀ-ÖØ-öø-ÿ]/g)||[]).length,upper=(line.match(/[A-ZÀ-ÖØ-Þ]/g)||[]).length/Math.max(1,letters),words=line.split(/\s+/).length;let score=55-i*2+Math.min(22,letters*.65)+(upper>.7?18:upper>.4?8:0)+(words<=6?8:0)+(line.length>=4&&line.length<=38?8:0)-((line.match(/[,.;]/g)||[]).length*3);add(line,score);if(i<raw.length-1&&i<10){const next=raw[i+1];if(line.length<36&&next.length<36&&!noise.test(next))add(line+' '+next,score+10)}});return out.sort((a,b)=>b.score-a.score).slice(0,8).map(x=>x.title)}
function showOcrCandidates(candidates,text){ocrCandidates=candidates;modal.innerHTML=`<div class="modal"><section class="sheet"><h2>Vælg filmens titel</h2><p class="lead">Appen har læst teksten på coveret. Tryk på den rigtige titel — du behøver ikke skrive den.</p><div class="settings-list">${candidates.map((x,i)=>`<button class="btn ${i===0?'primary':''}" data-action="use-ocr-title" data-index="${i}">${esc(x)}</button>`).join('')}</div><div class="actions" style="margin-top:14px"><label class="btn">📷 Tag nyt billede<input hidden type="file" id="ocrRetake" accept="image/*" capture="environment"></label><button class="btn" data-action="close-modal">Annuller</button></div><details style="margin-top:14px"><summary class="muted">Vis al læst tekst</summary><pre style="white-space:pre-wrap;color:var(--muted);font:inherit">${esc(text)}</pre></details></section></div>`}
async function scanCoverText(file){if(!file)return;try{await fileToCover(file);modal.innerHTML=`<div class="modal"><section class="sheet"><h2>Læser teksten på coveret</h2><p class="lead" id="ocrStatus">Forbereder tekstgenkendelse…</p><div style="height:10px;border-radius:999px;background:var(--panel2);overflow:hidden"><div id="ocrProgress" style="height:100%;width:4%;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:width .2s"></div></div><p class="muted" style="margin-top:12px">Første scanning kan tage lidt længere tid, fordi tekstgenkendelsen hentes til telefonen.</p></section></div>`;const ok=await loadTesseract();if(!ok)throw Error('Tekstgenkendelsen kunne ikke hentes');const status=document.querySelector('#ocrStatus'),bar=document.querySelector('#ocrProgress');const worker=await Tesseract.createWorker('eng',1,{logger:m=>{if(status&&m.status)status.textContent=m.status==='recognizing text'?'Læser tekst…':m.status;if(bar&&typeof m.progress==='number')bar.style.width=Math.max(4,Math.round(m.progress*100))+'%'}});const result=await worker.recognize(file);await worker.terminate();const text=result?.data?.text||'',candidates=ocrTitleCandidates(text);if(!candidates.length){modal.innerHTML=`<div class="modal"><section class="sheet"><h2>Ingen tydelig titel fundet</h2><p class="lead">Tag et nyt billede tættere på forsiden, hold telefonen lige og undgå genskin.</p><div class="actions"><label class="btn primary">📷 Prøv igen<input hidden type="file" id="ocrRetake" accept="image/*" capture="environment"></label><button class="btn" data-action="close-modal">Luk</button></div></section></div>`;return}showOcrCandidates(candidates,text)}catch(e){console.error(e);modal.innerHTML=`<div class="modal"><section class="sheet"><h2>Coverteksten kunne ikke læses</h2><p class="lead">${esc(e.message||'Prøv igen med et tydeligere billede.')}</p><div class="actions"><label class="btn primary">📷 Prøv igen<input hidden type="file" id="ocrRetake" accept="image/*" capture="environment"></label><button class="btn" data-action="close-modal">Luk</button></div></section></div>`}}
async function useOcrTitle(index){const title=ocrCandidates[Number(index)];if(!title)return;const d=formData()||current();d.title=cleanMovieTitle(title)||title;draft=d;write(DRAFT,d);closeModal();setView('form');msg('Titlen er læst fra coveret. Søger oplysninger og omslag…');try{await lookupTitle()}catch(e){console.warn(e)}}
async function startScanner(){const help=document.querySelector('#scanHelp'),video=document.querySelector('#video');try{const ok=await loadZXing();if(!ok)throw Error('Bibliotek kunne ikke hentes');scanner=new ZXing.BrowserMultiFormatReader();await scanner.decodeFromVideoDevice(null,video,(result)=>{if(result){const code=result.getText();stopScanner();lookupBarcode(code)}});help.textContent='Kameraet er klar. Peg på stregkoden.'}catch(e){console.error(e);help.textContent='Kamera-scanning kunne ikke starte. Skriv stregkoden manuelt nedenfor.'}}
function stopScanner(){try{scanner?.reset()}catch{}scanner=null;document.querySelector('#video')?.srcObject?.getTracks?.().forEach(t=>t.stop())}
function closeModal(){stopScanner();modal.innerHTML=''}
function exportBackup(){const blob=new Blob([JSON.stringify({version:4,exportedAt:new Date().toISOString(),films,settings},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='filmsamling-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function importBackup(file){try{const j=JSON.parse(await file.text());if(!Array.isArray(j.films))throw Error();films=j.films;settings={...settings,...(j.settings||{})};persist();write(SET,settings);setView('library');msg('Backup importeret.')}catch{msg('Backupfilen kunne ikke læses.')}}
document.addEventListener('click',e=>{const b=e.target.closest('[data-action]');if(!b)return;const a=b.dataset.action,id=b.dataset.id;if(a==='new'){state.edit=null;draft=null;localStorage.removeItem(DRAFT);setView('form')}if(a==='edit'){state.edit=id;draft=null;setView('form')}if(a==='detail'){state.detail=id;render()}if(a==='back'){state.detail=null;render()}if(a==='cancel'){state.edit=null;setView('library')}if(a==='delete'&&confirm('Slet denne film?')){films=films.filter(f=>f.id!==id);persist();state.detail=null;render();msg('Filmen er slettet.')}if(a==='scan')openScanner();if(a==='close-modal')closeModal();if(a==='use-code')lookupBarcode(document.querySelector('#manualCode')?.value);if(a==='lookup-title')lookupTitle();if(a==='use-ocr-title')useOcrTitle(b.dataset.index);if(a==='remove-cover'){const d=formData()||current();d.cover='';draft=d;write(DRAFT,d);renderForm()}if(a==='save-settings'){settings.tmdbToken=document.querySelector('#tmdbToken').value.trim();write(SET,settings);msg('Indstillingerne er gemt.')}if(a==='export')exportBackup();if(a==='clear'&&confirm('Slet alle film? Dette kan ikke fortrydes.')){films=[];persist();render();msg('Samlingen er slettet.')}});
document.addEventListener('input',e=>{if(e.target.id==='search'){state.search=e.target.value;renderLibrary();const s=document.querySelector('#search');s.focus();s.setSelectionRange(state.search.length,state.search.length)}else if(e.target.closest('#filmForm')){clearTimeout(draftNow.t);draftNow.t=setTimeout(draftNow,250)}});
document.addEventListener('change',e=>{if(e.target.id==='formatFilter'){state.format=e.target.value;renderLibrary()}if(e.target.id==='coverFile'||e.target.id==='coverCamera')fileToCover(e.target.files?.[0]);if(e.target.id==='coverTextCamera'||e.target.id==='libraryCoverTextCamera'||e.target.id==='ocrRetake')scanCoverText(e.target.files?.[0]);if(e.target.id==='importFile')importBackup(e.target.files?.[0])});
document.addEventListener('submit',e=>{if(e.target.id==='filmForm'){e.preventDefault();saveFilm()}});
document.querySelector('.nav').addEventListener('click',e=>{const b=e.target.closest('[data-view]');if(b){state.edit=null;setView(b.dataset.view)}});document.querySelector('#quickAdd').onclick=()=>{state.edit=null;setView('form')};
window.addEventListener('pagehide',()=>{if(state.view==='form')draftNow()});
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});if(window.caches)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{})}
render();
})();
</script>
